name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  embedding-extra:
    name: embedding extra (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --extra embedding --dev
      - run: uv run python -c "import sentence_transformers, sqlite_vec"
      - run: |
          uv run pytest \
            tests/embeddings/test_contracts.py \
            tests/packaging/test_embedding_extra.py \
            tests/vector \
            tests/adapters/test_exact_cosine_projection.py \
            tests/adapters/test_sqlite_vec_projection.py \
            tests/evaluation/test_dense_compatibility.py \
            tests/evaluation/test_dense_candidate.py \
            tests/evaluation/test_dense_threshold.py \
            tests/evaluation/test_dense_comparison.py \
            tests/evaluation/test_dense_artifact.py \
            tests/evaluation/test_dense_replay.py \
            tests/evaluation/test_dense_documentation.py \
            tests/scripts/test_dense_retrieval_deployment_proof.py \
            tests/scripts/test_dense_retrieval_measurement.py \
            -q
      - name: Validate dense compatibility artifact without model cache
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path
          from mke.evaluation.dense_compatibility import (
              load_dense_corpus_lock,
              validate_dense_compatibility_report,
          )
          root = Path(".").resolve()
          lock = load_dense_corpus_lock(
              Path("tests/fixtures/retrieval-dense-v1/corpus-lock.json"),
              repository_root=root,
          )
          report = json.loads(
              Path("benchmarks/retrieval/qwen3-embedding-0.6b-compatibility.json").read_text()
          )
          validate_dense_compatibility_report(report, lock)
          assert report["compatibility_status"] == "passed"
          assert report["projection"]["selected_adapter"] == "exact-cosine-v1"
          PY

  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - name: Run full test suite with live diagnostics
        env:
          PYTHONFAULTHANDLER: "1"
          PYTHONUNBUFFERED: "1"
        run: >-
          uv run pytest -vv --tb=short
          --durations=50 --durations-min=1.0
          -o faulthandler_timeout=120
          -o faulthandler_exit_on_timeout=true
      - run: uv run ruff check .
      - run: uv run pyright
      - name: Run retrieval evaluation baseline
        run: |
          uv run mke eval retrieval \
            --manifest tests/fixtures/retrieval-eval-v1.json \
            --json > /tmp/mke-retrieval-eval.json
          python - <<'PY'
          import json
          payload = json.load(open("/tmp/mke-retrieval-eval.json"))
          assert payload["status"] == "passed"
          assert payload["quality_status"] == "baseline_recorded"
          assert payload["documents"] == 3
          assert payload["queries"] == 24
          assert payload["answerable"] == 16
          assert payload["unanswerable"] == 8
          assert payload["integrity_failures"] == []
          print(json.dumps(payload["metrics"], sort_keys=True))
          PY
          uv run python -m mke.evaluation.baseline \
            --artifact benchmarks/retrieval/retrieval-eval-v1-baseline.json \
            --manifest tests/fixtures/retrieval-eval-v1.json \
            --repository . \
            --main-ref origin/main
      - name: Validate numeric retrieval candidate comparison
        run: |
          set +e
          uv run mke eval retrieval-numeric \
            --protocol tests/fixtures/retrieval-numeric-v1/protocol-lock.json \
            --json > /tmp/numeric-comparison.json
          comparison_status=$?
          set -e
          case "$comparison_status" in
            0|1) ;;
            *) exit "$comparison_status" ;;
          esac
          COMPARISON_STATUS="$comparison_status" uv run python -c \
            'import json, os; p=json.load(open("/tmp/numeric-comparison.json")); assert p["integrity_status"] == "passed"; assert (p["candidate_status"] == "passed") == (int(os.environ["COMPARISON_STATUS"]) == 0)'
          uv run python -m mke.evaluation.numeric_artifact validate \
            --artifact benchmarks/retrieval/numeric-grouping-v1-comparison.json \
            --observed /tmp/numeric-comparison.json \
            --protocol tests/fixtures/retrieval-numeric-v1/protocol-lock.json \
            --repository .
      - name: Run Chinese retrieval baseline
        run: |
          uv run mke eval retrieval-chinese \
            --protocol tests/fixtures/retrieval-chinese-v1/protocol.json \
            --json > /tmp/mke-retrieval-chinese.json
          uv run python -m mke.evaluation.chinese_artifact validate \
            --artifact benchmarks/retrieval/retrieval-chinese-v1-baseline.json \
            --observed /tmp/mke-retrieval-chinese.json \
            --protocol tests/fixtures/retrieval-chinese-v1/protocol.json \
            --repository .
      - name: Validate CJK lexical comparison candidate
        run: |
          uv run mke eval retrieval-cjk-lexical \
            --protocol tests/fixtures/retrieval-chinese-v1/protocol.json \
            --candidate cjk-trigram-overlap-v1 \
            --json > /tmp/mke-cjk-lexical-comparison.json
          uv run python -m mke.evaluation.cjk_lexical_artifact validate \
            --artifact benchmarks/retrieval/cjk-trigram-overlap-v1-comparison.json \
            --observed /tmp/mke-cjk-lexical-comparison.json \
            --protocol tests/fixtures/retrieval-chinese-v1/protocol.json \
            --repository .
      - name: Validate dense comparison artifact model-free
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          uv run python scripts/dense_retrieval_measurement.py \
            --repository . \
            --protocol tests/fixtures/retrieval-dense-v1/protocol-lock.json \
            --artifact benchmarks/retrieval/qwen3-embedding-0.6b-exact-v1-comparison.json \
            --model-free
      - run: uv build
      - name: Verify spoken fixture with transcription extra
        env:
          MKE_REQUIRE_TRANSCRIPTION_EXTRA: "1"
        run: |
          uv sync --locked --extra transcription
          uv run pytest tests/adapters/test_spoken_video_fixture.py -q
      - run: |
          uv venv /tmp/mke-wheel-env --python "${{ matrix.python-version }}"
          uv pip install --python /tmp/mke-wheel-env/bin/python dist/*.whl
          /tmp/mke-wheel-env/bin/mke
          /tmp/mke-wheel-env/bin/mke demo --verify
          (
            cd "$RUNNER_TEMP"
            /tmp/mke-wheel-env/bin/mke eval retrieval \
              --manifest "$GITHUB_WORKSPACE/tests/fixtures/retrieval-eval-v1.json" \
              --json > /tmp/mke-wheel-retrieval-eval.json
            /tmp/mke-wheel-env/bin/mke eval retrieval-cjk-lexical \
              --protocol "$GITHUB_WORKSPACE/tests/fixtures/retrieval-chinese-v1/protocol.json" \
              --candidate cjk-trigram-overlap-v1 \
              --json > /tmp/mke-wheel-cjk-lexical-comparison.json
            /tmp/mke-wheel-env/bin/python -m mke.evaluation.cjk_lexical_artifact validate \
              --artifact "$GITHUB_WORKSPACE/benchmarks/retrieval/cjk-trigram-overlap-v1-comparison.json" \
              --observed /tmp/mke-wheel-cjk-lexical-comparison.json \
              --protocol "$GITHUB_WORKSPACE/tests/fixtures/retrieval-chinese-v1/protocol.json" \
              --repository "$GITHUB_WORKSPACE"
          )
          python - <<'PY'
          import json
          payload = json.load(open("/tmp/mke-wheel-retrieval-eval.json"))
          assert payload["status"] == "passed"
          assert payload["quality_status"] == "baseline_recorded"
          assert payload["queries"] == 24
          cjk = json.load(open("/tmp/mke-wheel-cjk-lexical-comparison.json"))
          assert cjk["integrity_status"] == "passed"
          assert cjk["candidate_status"] == "passed"
          assert cjk["projection"]["tokenizer"] == "trigram"
          PY
      - name: Measure Chinese retrieval delivery
        run: |
          wheel=$(echo dist/*.whl)
          uv run python scripts/chinese_retrieval_measurement.py \
            --repository "$GITHUB_WORKSPACE" \
            --protocol "$GITHUB_WORKSPACE/tests/fixtures/retrieval-chinese-v1/protocol.json" \
            --wheel "$wheel" \
            --python "${{ matrix.python-version }}" \
            --installed-environment /tmp/mke-wheel-env \
            > /tmp/mke-chinese-measurement.json
          python -c 'import json; p=json.load(open("/tmp/mke-chinese-measurement.json")); assert p["status"] == "passed"; print("```json"); print(json.dumps(p, indent=2, sort_keys=True)); print("```")' \
            >> "$GITHUB_STEP_SUMMARY"
      - name: Verify transcription wheel extra without a model
        run: |
          uv export --locked --extra transcription --no-dev --no-emit-project \
            --output-file /tmp/mke-transcription-constraints.txt
          uv venv --clear /tmp/mke-wheel-env --python "${{ matrix.python-version }}"
          wheel=$(echo dist/*.whl)
          uv pip install --python /tmp/mke-wheel-env/bin/python \
            --constraint /tmp/mke-transcription-constraints.txt \
            "${wheel}[transcription]"
          /tmp/mke-wheel-env/bin/python -c "import av, faster_whisper"
          set +e
          doctor_output=$(HF_HUB_OFFLINE=1 \
            /tmp/mke-wheel-env/bin/mke transcription doctor \
            --model-cache "$RUNNER_TEMP/mke-empty-model-cache" \
            --json)
          doctor_status=$?
          set -e
          test "$doctor_status" -eq 1
          python -c 'import json,sys; payload=json.loads(sys.argv[1]); assert payload["status"] == "not_ready"' "$doctor_output"
          test ! -d .cache/huggingface
          test ! -d models
