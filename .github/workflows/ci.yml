name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run pytest -q
      - run: uv run ruff check .
      - run: uv run pyright
      - name: Run retrieval evaluation baseline
        run: |
          uv run mke eval retrieval \
            --manifest tests/fixtures/retrieval-eval-v1.json \
            --json > /tmp/mke-retrieval-eval.json
          python - <<'PY'
          import json
          payload = json.load(open("/tmp/mke-retrieval-eval.json"))
          assert payload["status"] == "passed"
          assert payload["quality_status"] == "baseline_recorded"
          assert payload["documents"] == 3
          assert payload["queries"] == 24
          assert payload["answerable"] == 16
          assert payload["unanswerable"] == 8
          assert payload["integrity_failures"] == []
          print(json.dumps(payload["metrics"], sort_keys=True))
          PY
          uv run python -m mke.evaluation.baseline \
            --artifact benchmarks/retrieval/retrieval-eval-v1-baseline.json \
            --manifest tests/fixtures/retrieval-eval-v1.json \
            --repository . \
            --main-ref origin/main
      - name: Validate numeric retrieval candidate comparison
        run: |
          set +e
          uv run mke eval retrieval-numeric \
            --protocol tests/fixtures/retrieval-numeric-v1/protocol-lock.json \
            --json > /tmp/numeric-comparison.json
          comparison_status=$?
          set -e
          case "$comparison_status" in
            0|1) ;;
            *) exit "$comparison_status" ;;
          esac
          COMPARISON_STATUS="$comparison_status" uv run python -c \
            'import json, os; p=json.load(open("/tmp/numeric-comparison.json")); assert p["integrity_status"] == "passed"; assert (p["candidate_status"] == "passed") == (int(os.environ["COMPARISON_STATUS"]) == 0)'
          uv run python -m mke.evaluation.numeric_artifact validate \
            --artifact benchmarks/retrieval/numeric-grouping-v1-comparison.json \
            --observed /tmp/numeric-comparison.json \
            --protocol tests/fixtures/retrieval-numeric-v1/protocol-lock.json \
            --repository .
      - run: uv build
      - name: Verify spoken fixture with transcription extra
        env:
          MKE_REQUIRE_TRANSCRIPTION_EXTRA: "1"
        run: |
          uv sync --locked --extra transcription
          uv run pytest tests/adapters/test_spoken_video_fixture.py -q
      - run: |
          uv venv /tmp/mke-wheel-env --python "${{ matrix.python-version }}"
          uv pip install --python /tmp/mke-wheel-env/bin/python dist/*.whl
          /tmp/mke-wheel-env/bin/mke
          /tmp/mke-wheel-env/bin/mke demo --verify
          (
            cd "$RUNNER_TEMP"
            /tmp/mke-wheel-env/bin/mke eval retrieval \
              --manifest "$GITHUB_WORKSPACE/tests/fixtures/retrieval-eval-v1.json" \
              --json > /tmp/mke-wheel-retrieval-eval.json
          )
          python - <<'PY'
          import json
          payload = json.load(open("/tmp/mke-wheel-retrieval-eval.json"))
          assert payload["status"] == "passed"
          assert payload["quality_status"] == "baseline_recorded"
          assert payload["queries"] == 24
          PY
      - name: Verify transcription wheel extra without a model
        run: |
          uv export --locked --extra transcription --no-dev --no-emit-project \
            --output-file /tmp/mke-transcription-constraints.txt
          uv venv --clear /tmp/mke-wheel-env --python "${{ matrix.python-version }}"
          wheel=$(echo dist/*.whl)
          uv pip install --python /tmp/mke-wheel-env/bin/python \
            --constraint /tmp/mke-transcription-constraints.txt \
            "${wheel}[transcription]"
          /tmp/mke-wheel-env/bin/python -c "import av, faster_whisper"
          set +e
          doctor_output=$(HF_HUB_OFFLINE=1 \
            /tmp/mke-wheel-env/bin/mke transcription doctor \
            --model-cache "$RUNNER_TEMP/mke-empty-model-cache" \
            --json)
          doctor_status=$?
          set -e
          test "$doctor_status" -eq 1
          python -c 'import json,sys; payload=json.loads(sys.argv[1]); assert payload["status"] == "not_ready"' "$doctor_output"
          test ! -d .cache/huggingface
          test ! -d models
