name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run pytest -q
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv build
      - run: |
          uv venv /tmp/mke-wheel-env --python "${{ matrix.python-version }}"
          uv pip install --python /tmp/mke-wheel-env/bin/python dist/*.whl
          /tmp/mke-wheel-env/bin/mke
          /tmp/mke-wheel-env/bin/mke demo --verify
      - name: Verify transcription wheel extra without a model
        run: |
          uv export --locked --extra transcription --no-dev --no-emit-project \
            --output-file /tmp/mke-transcription-constraints.txt
          uv venv --clear /tmp/mke-wheel-env --python "${{ matrix.python-version }}"
          wheel=$(echo dist/*.whl)
          uv pip install --python /tmp/mke-wheel-env/bin/python \
            --constraint /tmp/mke-transcription-constraints.txt \
            "${wheel}[transcription]"
          /tmp/mke-wheel-env/bin/python -c "import av, faster_whisper"
          set +e
          doctor_output=$(HF_HOME="$RUNNER_TEMP/mke-empty-hf" \
            /tmp/mke-wheel-env/bin/mke transcription doctor --json)
          doctor_status=$?
          set -e
          test "$doctor_status" -eq 1
          python -c 'import json,sys; payload=json.loads(sys.argv[1]); assert payload["status"] == "not_ready"' "$doctor_output"
          test ! -d .cache/huggingface
          test ! -d models
